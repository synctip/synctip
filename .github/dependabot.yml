version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [chore, dependencies]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: [chore, dependencies]
    groups:
      nestjs:
        patterns: ["@nestjs/*"]
      prisma:
        patterns: ["prisma", "@prisma/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      tanstack:
        patterns: ["@tanstack/*"]
