name: CI

on:
  pull_request:
    branches: [develop, stage, beta, main]
  push:
    branches: [develop, stage, beta, main]

# Cancel older runs on the same branch / PR so we don't queue stale work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: synctip_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/synctip_ci

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate --schema packages/db/prisma/schema.prisma

      - name: Apply migrations (validates schema + migration files)
        run: cd packages/db && bunx prisma migrate deploy

      - name: Lint (web)
        run: cd apps/web && bun run lint

      - name: Lint (api)
        run: cd apps/api && bun run lint

      - name: Test (api)
        run: cd apps/api && bun run test

      - name: Build web (includes typecheck via tsc -b)
        run: cd apps/web && bun run build

      - name: Typecheck api
        run: cd apps/api && bunx tsc --noEmit
