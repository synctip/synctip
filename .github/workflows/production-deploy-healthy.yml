name: production-deploy-healthy

# Runs after every push to `main`. Monitoring-only: nothing promotes
# off of `main`, so this check does not gate any other PR. It exists so
# we get a red workflow run + notification if a release lands and the
# production deploy doesn't come up healthy.
#
# Same two-phase shape as stage-deploy-healthy; see that workflow for
# the design notes.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: production-deploy-healthy-${{ github.sha }}
  cancel-in-progress: false

jobs:
  production-deploy-healthy:
    name: production-deploy-healthy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      EXPECTED_TIER: production
      API_URL: ${{ vars.API_URL_PROD }}
      WEB_URL: ${{ vars.WEB_URL_PROD }}
      API_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID_API_PROD }}
      WEB_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID_WEB_PROD }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

    steps:
      - uses: actions/checkout@v7

      - name: Verify Render deploy (api)
        run: bash .github/scripts/verify-render-deploy.sh api "$API_SERVICE_ID" "$GITHUB_SHA"

      - name: Verify Render deploy (web)
        run: bash .github/scripts/verify-render-deploy.sh web "$WEB_SERVICE_ID" "$GITHUB_SHA"

      - name: Assert api /health
        run: |
          set -uo pipefail
          echo "Expecting status=pass tier=$EXPECTED_TIER"

          body=""
          for i in $(seq 1 18); do
            body="$(curl -fsSL --max-time 10 "$API_URL/health" || true)"
            status="$(printf '%s' "$body"  | jq -r '.status    // empty' 2>/dev/null || true)"
            tier="$(printf '%s' "$body"    | jq -r '.tier      // empty' 2>/dev/null || true)"
            release="$(printf '%s' "$body" | jq -r '.releaseId // empty' 2>/dev/null || true)"

            if [ "$status" = "pass" ] && [ "$tier" = "$EXPECTED_TIER" ]; then
              echo "OK  api healthy on attempt $i (releaseId=$release)"
              printf '%s\n' "$body" | jq .
              exit 0
            fi

            echo "attempt $i/18: status=${status:-?} tier=${tier:-?} releaseId=${release:-?}"
            sleep 10
          done

          echo "FAIL production-deploy-healthy: api did not report healthy after ~3 minutes"
          printf '%s\n' "${body:-<no response>}" | jq . 2>/dev/null \
            || echo "${body:-<no response>}"
          exit 1

      - name: Probe web origin
        run: |
          set -euo pipefail
          curl -fsSL --max-time 10 -o /dev/null -w "web http %{http_code}\n" "$WEB_URL/"
